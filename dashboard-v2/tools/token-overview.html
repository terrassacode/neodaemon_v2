<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Token Dashboard v0.1</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: #0f172a;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #1e293b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
    }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      color: #bfdbfe;
      text-decoration: none;
    }

    .hero, .card {
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .hero {
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: -0.05em;
    }

    .muted {
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      border-radius: 18px;
      padding: 18px;
    }

    .label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .value {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .error {
      border-color: #fb7185;
      color: #fecdd3;
    }

    @media (max-width: 760px) {
      body { padding: 14px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="./resource-usage.html">← Volver a Actividad y consumo</a>

    <section class="hero">
      <h1>Token Dashboard v0.1</h1>
      <p class="muted">Contador básico de tokens basado en sesiones recientes de OpenClaw.</p>
      <p class="muted" id="updated">Cargando actualización…</p>
    </section>

    <section class="grid" id="cards">
      <div class="card">Cargando datos…</div>
    </section>
  </main>

  <script>
    const TOKEN_DASHBOARD_URL = "../data/token_dashboard_v0_1.json";

    function numberText(value) {
      return Number(value || 0).toLocaleString("es-ES");
    }

    function text(value) {
      return value === undefined || value === null ? "" : String(value);
    }

    function formatDate(value) {
      const date = new Date(String(value || ""));
      if (Number.isNaN(date.getTime())) return "sin datos";
      return date.toLocaleString("es-ES");
    }

    function card(label, value, hint = "") {
      return `
        <div class="card">
          <div class="label">${label}</div>
          <div class="value">${numberText(value)}</div>
          ${hint ? `<div class="muted">${hint}</div>` : ""}
        </div>
      `;
    }

    function comparisonCard(comparison) {
      const current = comparison?.current_24h_tokens || 0;
      const previous = comparison?.previous_24h_tokens || 0;
      const status = comparison?.status || "sin datos suficientes";
      const delta = comparison?.delta_percent;
      const deltaText = delta === null || delta === undefined
        ? status
        : `${delta > 0 ? "+" : ""}${delta}% vs 24h anteriores`;

      return `
        <div class="card wide">
          <div class="label">Comparación consumo 24h estimada</div>
          <div class="value">${deltaText}</div>
          <div class="muted">Últimas 24h: ${numberText(current)} tokens · 24h anteriores: ${numberText(previous)} tokens</div>
        </div>
      `;
    }

    function render(data) {
      const total = data.total || {};
      const last24h = data.last_24h || {};
      const comparison = data.rolling_24h_comparison || {};
      const last = data.last_iteration || {};

      document.getElementById("updated").textContent =
        `Última actualización: ${formatDate(data.updated_at)}`;

      document.getElementById("cards").innerHTML = `
        ${card("Tokens totales", total.total_tokens)}
        ${card("Tokens entrada totales", total.input_tokens)}
        ${card("Tokens salida totales", total.output_tokens)}
        ${card("Tokens entrada últimas 24h", last24h.input_tokens)}
        ${card("Tokens salida últimas 24h", last24h.output_tokens)}
        ${card("Tokens última interacción", last.total_tokens, `Fecha: ${formatDate(last.timestamp)}`)}
        ${comparisonCard(comparison)}
      `;
    }

    async function load() {
      try {
        const response = await fetch(TOKEN_DASHBOARD_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        render(data);
      } catch (error) {
        document.getElementById("cards").innerHTML =
          `<div class="card error wide">No se pudo cargar token_dashboard_v0_1.json: ${text(error.message)}</div>`;
      }
    }

    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
